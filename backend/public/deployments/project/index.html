<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deployment Test</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-cyan: #00f3ff;
            --accent-blue: #457bff;
            --text-main: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-cyan);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #b0b0b0;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.5rem 1.5rem;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--accent-cyan);
            border-radius: 50px;
            color: var(--accent-cyan);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .btn {
            margin-top: 2rem;
            background: var(--accent-cyan);
            color: var(--bg-color);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            box-shadow: 0 0 20px var(--accent-cyan);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Deployment Success</h1>
        <p>This project was successfully analyzed by the AI and deployed to the live server. Directory structure has been optimized for performance.</p>
        
        <div class="status-badge">
            Status: System Online
        </div>

        <br>
        
        <button class="btn" onclick="showAlert()">Test Interaction</button>
    </div>

    <script>
        function showAlert() {
            alert("JavaScript is working perfectly on your deployed site!");
            console.log("Deployment Test: JS Execution Success");
        }
    </script>
</body>
</html>
